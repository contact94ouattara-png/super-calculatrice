<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="super_calculatrice.css" media="all" type="text/css">
    <title>Ma Super Calculatrice JS</title>
</head>
<body>
    <div id="titre"> <span>S</span>uper<span>C</span>alculatrice  <p id="js">JS</p> </div>
    <div class="superCalc">

        <div class="myScreen" id="mySc">0</div>

        <button class="ac" id="ac">AC</button>
        <button class="operator" id="div">/</button>
        <button class="operator" id="mlt">x</button>
        <button class="del" id="del"><img src="backspace_40dp_2854C5_FILL0_wght400_GRAD0_opsz40.png" alt="del"></button>

        <button class="number" id="setp">7</button>
        <button class="number" id="huit">8</button>

        <button class="operator">-</button>

        <button class="number" id="deux">2</button>
        <button class="number" id="trois">3</button>
        <button class="operator" id="pourcentage">%</button>

        <button class="virgil" id="virgil">,</button>
